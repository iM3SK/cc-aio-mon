version: 2
updates:
  # CI: bandit + transitive deps pinned by hash in requirements-bandit.txt
  - package-ecosystem: pip
    directory: "/.github/workflows"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"

  # GitHub Actions versions (already SHA-pinned; Dependabot keeps the pins current)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
