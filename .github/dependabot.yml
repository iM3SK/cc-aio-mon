version: 2
updates:
  # CI: bandit pinned in requirements-bandit.in; lockfile requirements-bandit.txt
  # is pip-compile --generate-hashes managed (Dependabot regenerates the whole
  # hash tree via the .in, so transitive deps no longer fail to update)
  - package-ecosystem: pip
    directory: "/.github/workflows"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"

  # GitHub Actions versions (already SHA-pinned; Dependabot keeps the pins current)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
